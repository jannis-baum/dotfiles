launchAtLogin: true
hotkey: cmd+f7

PATH:
  - /opt/homebrew/bin
  - ~/.local/bin

panel:
  keepCentered: true

search:
  program:
    exec: fzf
    args: ["--read0", "--print0", "--delimiter=:", "--nth=2..", "-f"] 

modules:
  - switcher:
      name: ""
      envOptions:
        IGNORED_APPS: "net.kovidgoyal.kitty"
  - app-search:
      trigger: (^..+)
      maxResults: 3

  - /native/controller:
      trigger: ^sc (.*)
  - /native/childProcessMonitor:
      trigger: ^mon (.*)
  - /native/indexer

  - control-center
  - clipboard:
      trigger: ^p (.*)
  - math
  - keychain
  - unicode
  - safari-histmarks
  - /inline/zen-sketchytabs:
      name: Zen Tabs
      trigger: (^..+)
      source:
        program:
          exec: zsh
          args: ["-c", "test -f /Volumes/sketchytabs/Zen/tabs.json && cat /Volumes/sketchytabs/Zen/tabs.json"]
      sink:
        program:
          exec: zsh
          args: ["-c", "curl '{{ userInfo }}'; open -a Zen; printf closePanel"]
  - pkill
  - timer
  - /inline/date-copy:
      name: "Dates"
      trigger: "^date (.*)"
      suppressOthers: true
      reloadsOnChange: false
      source:
        program:
          exec: zsh
          args:
            - -c
            - |
              jq -n '
                def fmt(n): (now + n * 86400) | strftime("%y-%m-%d");
                def day(n): (now + n * 86400) | strftime("%A");
                [
                  { "title": "Today (\(day(0)))", "caption": fmt(0) },
                  { "title": "Tomorrow (\(day(1)))", "caption": fmt(1) },
                  (range(2; 7) | {"title": day(.), "caption": fmt(.) }),
                  { "title": "Next week", "caption": fmt(7) }
                ]
              '
      sink:
        program:
          exec: zsh
          args:
            - -c
            - |
              printf {{ caption }} | pbcopy && printf closePanel
      defaultSymbol: 􀉉 
  - /inline/viclip:
      name: ""
      trigger: "^cp (.*)"
      suppressOthers: true
      isSearchDisabled: true
      reloadsOnChange: false
      source:
        program:
          exec: zsh
          args:
            - -c
            - |
              echo '[{ "title": "Edit clipboard" }]'
      sink:
        program:
          exec: zsh
          args:
            - -c
            - |
              viclip-tab
              printf closePanel
      defaultSymbol: 􀉃
